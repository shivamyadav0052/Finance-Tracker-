services:
  - type: web
    name: finance-tracker-api
    env: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: PYTHON_SERVICE_URL
        sync: false
      - key: NODE_ENV
        value: production

  - type: web
    name: finance-tracker-python
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    rootDir: python-service
    envVars:
      - key: PORT
        value: 10000
